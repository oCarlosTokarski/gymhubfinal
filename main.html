<!-- Feito com inteligencia artificial pra esse comando é apenas uma piada de entreterimento -->
     <script>
  const usain = document.getElementById('usain');
  let timer;

  usain.addEventListener('mouseenter', () => {
    timer = setTimeout(() => {
        usain.classList.add('fugir');
    }, 5000); // 5 segundos
});

usain.addEventListener('mouseleave', () => {
    clearTimeout(timer);
});
