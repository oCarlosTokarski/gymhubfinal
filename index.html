<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gymhub | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="multimidia/icon.jpeg" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="bg">
      <img src="multimidia/backgroudImage.png" class="bg-image" />
    </div>
    <div class="container">
      <img src="multimidia/icon.png" class="logo-img" />

      <h2 class="mensagem-login">
        "Nunca deixe para amanhã oque pode fazer hoje."
      </h2>
      <div class="login-card">
        <h2>Login</h2>

        <form id="loginForm">
          <div class="caixa-input">
            <span class="icon"><i class="fa-solid fa-user"></i></span>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Digite seu email:"
            />
          </div>

          <div class="caixa-input">
            <span class="icon"><i class="fa-solid fa-lock"></i></span>
            <input
              type="password"
              name="senha"
              id="senha"
              placeholder="Digite sua senha:"
            />
          </div>

          <div class="options">
            <label> <input type="checkbox" /> Lembrar usuário </label>
            <a href="" class="links">Esqueceu a senha?</a>
          </div>

          <button
            type="submit"
            class="botao"
          >
            Entrar
          </button>
          <br />
          <div id="registro">
            <a href="registro.html" class="links">Registrar-se</a>
          </div>
        </form>
      </div>
    </div>
<!-- feito com auxilio de ia e um login ficticio por nao ter banco de dados -->
    <script>
const form = document.getElementById("loginForm");

const emailCorreto = "das@gymhub.com";
const senhaCorreta = "123456";

form.addEventListener("submit", function(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if (email === emailCorreto && senha === senhaCorreta) {
        window.location.href = "main.html";
    } else {
        alert("Email ou senha incorretos!");
    }
});
</script>
  </body>

 
</html>
